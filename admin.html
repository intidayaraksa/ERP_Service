<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Internal - ERP Service Teknik</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding-bottom: 90px; }
        header { background: linear-gradient(135deg, #1e40af, #6b21a8); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        header h1 { font-size: 1.2rem; font-weight: 800; color: #fff; }
        header p { font-size: 0.7rem; color: #cbd5e1; }
        main { padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .section-title { font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; margin-top: 15px; }
        .grid-status { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card-status { background: #1e293b; padding: 15px; border-radius: 16px; border: 1px solid #334155; }
        .card-status .title { font-size: 0.75rem; color: #94a3b8; }
        .card-status .value { font-size: 1.5rem; font-weight: 800; margin-top: 5px; display: block; }
        .card-item { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 15px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .badge { font-size: 0.65rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; background: rgba(58,130,246,0.2); color: #60a5fa; }
        .item-title { font-size: 1.05rem; font-weight: 700; color: #ffffff; }
        .item-desc { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; display: flex; align-items: center; gap: 6px; }
        .card-actions { border-top: 1px solid #334155; margin-top: 12px; padding-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-wa { background: #22c55e; color: white; text-decoration: none; font-size: 0.75rem; font-weight: 700; padding: 6px 12px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px; }
        .btn-action { background: #334155; color: white; border: none; font-size: 0.75rem; padding: 6px 10px; border-radius: 8px; cursor: pointer; margin-left: 5px; }
        .btn-delete { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid #ef4444; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
        .form-control { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; font-size: 0.9rem; }
        .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 12px 5px; display: flex; justify-content: space-around; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #475569; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: #64748b; cursor: pointer; }
        .nav-item.active { color: #38bdf8; }
        .nav-item i { font-size: 1.1rem; }
        .nav-item span { font-size: 0.65rem; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>🔧 PANEL INTERNAL ERP</h1>
            <p>Mode Kontrol Utama Bengkel Teknik</p>
        </div>
        <div style="font-size:0.75rem; background:#1e293b; padding:5px 10px; border-radius:8px; border:1px solid #334155;">ADMIN</div>
    </header>

    <main>
        <!-- TAB 1: DASHBOARD MONITOR ORDER -->
        <div id="menu-dashboard" class="page active">
            <div class="section-title">Ringkasan Sistem Terkini</div>
            <div class="grid-status">
                <div class="card-status">
                    <span class="title">Total Pelanggan</span>
                    <span id="statPelanggan" class="value">0</span>
                </div>
                <div class="card-status" style="border-left: 4px solid #f59e0b;">
                    <span class="title">Tugas Antrean</span>
                    <span id="statOrder" class="value">0</span>
                </div>
            </div>
            <div class="section-title">Order Berjalan Lapangan (Dari Pelanggan)</div>
            <div id="container-order-list"></div>
        </div>

        <!-- TAB 2: EDIT / MANAGEMENT DATA PELANGGAN -->
        <div id="menu-pelanggan" class="page">
            <div class="section-title">Ubah / Input Data Pelanggan Tambahan</div>
            <div class="card-item" style="background:#1e293b;">
                <input type="hidden" id="editCustomerIdx">
                <div class="form-group">
                    <label>Nama Pelanggan</label>
                    <input type="text" id="custName" class="form-control">
                </div>
                <div class="form-group">
                    <label>Nomor WhatsApp HP</label>
                    <input type="number" id="custPhone" class="form-control">
                </div>
                <div class="form-group">
                    <label>Alamat Rumah</label>
                    <input type="text" id="custAddress" class="form-control">
                </div>
                <button id="btnSimpanPelanggan" class="btn-primary" onclick="simpanPelanggan()">UPDATE DATA PELANGGAN</button>
            </div>
            <div class="section-title">Data Master Konsumen Terdaftar</div>
            <div id="container-customer-list"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="pindahMenu('dashboard', this)">
            <i class="fa-solid fa-chart-pie"></i><span>Monitoring</span>
        </div>
        <div class="nav-item" onclick="pindahMenu('pelanggan', this)">
            <i class="fa-solid fa-users-gear"></i><span>Data Pelanggan</span>
        </div>
    </nav>
    <script>
        let dbPelanggan = JSON.parse(localStorage.getItem('db_pelanggan')) || [];
        let dbOrder = JSON.parse(localStorage.getItem('db_order')) || [];

        // Setiap 3 detik otomatis nge-cek data baru yang masuk dari HP Pelanggan
        setInterval(() => {
            dbPelanggan = JSON.parse(localStorage.getItem('db_pelanggan')) || [];
            dbOrder = JSON.parse(localStorage.getItem('db_order')) || [];
            renderDataAdmin();
        }, 3000);

        function pindahMenu(menuId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('menu-' + menuId).classList.add('active');
            element.classList.add('active');
            renderDataAdmin();
        }

        function renderDataAdmin() {
            document.getElementById('statPelanggan').innerText = dbPelanggan.length;
            document.getElementById('statOrder').innerText = dbOrder.filter(o => o.status !== 'Selesai').length;

            const orderList = document.getElementById('container-order-list');
            orderList.innerHTML = "";
            if(dbOrder.length === 0) {
                orderList.innerHTML = `<p style="color:#64748b; font-size:0.8rem; text-align:center; padding:20px;">Belum ada antrean order dari web pelanggan.</p>`;
            } else {
                dbOrder.forEach((o, idx) => {
                    const teksWA = encodeURIComponent(`Halo ${o.namaPelanggan}, order servis ${o.jenisAlat} Anda sudah kami setujui.`);
                    orderList.innerHTML += `
                        <div class="card-item">
                            <div class="card-header">
                                <span class="badge">${o.jenisAlat}</span>
                                <span style="font-size:0.75rem; color:#f59e0b;">${o.status || 'Antrean'}</span>
                            </div>
                            <div class="item-title">${o.namaPelanggan}</div>
                            <div class="item-desc"><i class="fa-solid fa-circle-exclamation" style="color:#ef4444;"></i> ${o.keluhan}</div>
                            <div class="item-desc"><i class="fa-solid fa-location-dot"></i> ${o.alamatPelanggan}</div>
                            <div class="card-actions">
                                <button class="btn-action" style="background:#5b21b6;" onclick="tunjukTeknisi(${idx})"><i class="fa-solid fa-user-check"></i> Teknisi: ${o.teknisi}</button>
                                <div>
                                    <a href="https://wa.me{o.hpPelanggan}?text=${teksWA}" target="_blank" class="btn-wa"><i class="fa-brands fa-whatsapp"></i></a>
                                    <button class="btn-action btn-delete" onclick="selesaikanOrder(${idx})"><i class="fa-solid fa-check"></i> Selesai</button>
                                </div>
                            </div>
                        </div>`;
                });
            }

            const custList = document.getElementById('container-customer-list');
            custList.innerHTML = "";
            dbPelanggan.forEach((c, idx) => {
                custList.innerHTML += `
                    <div class="card-item">
                        <div class="item-title">${c.nama}</div>
                        <div class="item-desc">Phone: +${c.hp}</div>
                        <div class="item-desc">Alamat: ${c.alamat}</div>
                        <div class="card-actions">
                            <span>ID #${idx+101}</span>
                            <button class="btn-action" style="background:#f59e0b;" onclick="pemicuEdit(${idx})">Ubah</button>
                        </div>
                    </div>`;
            });
        }

        function tunjukTeknisi(idx) {
            const namaTeknisi = prompt("Masukkan Nama Teknisi Lapangan untuk tugas ini:", dbOrder[idx].teknisi);
            if(namaTeknisi) {
                dbOrder[idx].teknisi = namaTeknisi;
                dbOrder[idx].status = "Sedang Dikerjakan";
                localStorage.setItem('db_order', JSON.stringify(dbOrder));
                renderDataAdmin();
            }
        }

        function selesaikanOrder(idx) {
            if(confirm("Tandai order perbaikan ini telah selesai?")) {
                dbOrder[idx].status = "Selesai";
                localStorage.setItem('db_order', JSON.stringify(dbOrder));
                renderDataAdmin();
            }
        }

        function pemicuEdit(idx) {
            const c = dbPelanggan[idx];
            document.getElementById('custName').value = c.nama;
            document.getElementById('custPhone').value = c.hp;
            document.getElementById('custAddress').value = c.alamat;
            document.getElementById('editCustomerIdx').value = idx;
            pindahMenu('pelanggan', document.querySelectorAll('.nav-item'));
        }

        function simpanPelanggan() {
            const idx = document.getElementById('editCustomerIdx').value;
            if(idx !== "") {
                dbPelanggan[idx].nama = document.getElementById('custName').value;
                dbPelanggan[idx].hp = document.getElementById('custPhone').value;
                dbPelanggan[idx].alamat = document.getElementById('custAddress').value;
                localStorage.setItem('db_pelanggan', JSON.stringify(dbPelanggan));
                alert("Data berhasil diubah!");
                pindahMenu('dashboard', document.querySelectorAll('.nav-item'));
            }
        }
    </script>
</body>
</html>
